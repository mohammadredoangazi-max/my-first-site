<!DOCTYPE html>
<html>
<head>
    <title>আমার সুন্দর ওয়েবসাইট</title>
    <style>
        /* ওয়েবসাইট সুন্দর করার জন্য কিছু সহজ ডিজাইন (CSS) */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff; /* হালকা নীল ব্যাকগ্রাউন্ড */
            text-align: center;       /* সব লেখা ও ছবি মাঝখানে থাকবে */
            padding: 50px;
        }
        h1 {
            color: #333333;
        }
        p {
            color: #666666;
            font-size: 18px;
        }
        img {
            border-radius: 15px;      /* ছবির কোণাগুলো একটু গোল হবে */
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2); /* ছবির চারপাশে হালকা ছায়া */
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>স্বাগতম আমার নতুন ওয়েবসাইটে!</h1>
    <p>আমি সফলভাবে ছবিসহ এই সাইটটি সুন্দর করে সাজিয়েছি।</p>
    
    <img src="https://placekitten.com/400/300" alt="মিষ্টি বিড়াল" width="400">

</body>
</html>
