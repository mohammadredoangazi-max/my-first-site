<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পুনর্মিলনী ২০২৭ - পেমেন্ট ও রেজিস্ট্রেশন</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                        url('https://picsum.photos/id/10/1200/800') no-repeat center center fixed;
            background-size: cover;
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container { max-width: 600px; margin: 40px auto; padding: 20px; }
        .logo-box { width: 100px; height: 100px; background-color: white; border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; }
        .logo-box img { width: 80px; }
        h1 { font-size: 26px; margin-bottom: 5px; }
        .subtitle { font-size: 22px; color: #4ade80; font-weight: bold; margin-top: 0; }
        
        /* কাউন্টডাউন টাইমার */
        .timer-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .time-box { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); padding: 15px; border-radius: 15px; width: 70px; }
        .time-number { font-size: 24px; font-weight: bold; }
        .time-label { font-size: 12px; color: #a7f3d0; }

        /* ফর্ম স্টাইল */
        .reg-form { background: rgba(0, 0, 0, 0.7); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); text-align: left; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #a7f3d0; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        .submit-btn { width: 100%; background: #16a34a; color: white; padding: 12px; border: none; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* আইডি কার্ড স্টাইল (শুরুতে লুকানো থাকবে) */
        #id-card { display: none; background: white; color: black; padding: 25px; border-radius: 15px; max-width: 400px; margin: 30px auto; text-align: center; border: 4px double #16a34a; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .user-preview-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 15px 0; border: 3px solid #16a34a; }
        .barcode { font-family: 'Libre Barcode 39', Arial; font-size: 42px; margin-top: 15px; letter-spacing: 2px; }
        .print-btn { background: #0284c7; color: white; padding: 10px 20px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <div class="logo-box"><img src="https://img.icons8.com/education" alt="Logo"></div>
        <h1>পেকখালী হাজী এস এন জামান হাই স্কুল</h1>
        <p class="subtitle">পুনর্মিলনী - ২০২৭ রেজিস্ট্রেশন</p>

        <div class="timer-container">
            <div class="time-box"><div class="time-number" id="days">00</div><div class="time-label">দিন</div></div>
            <div class="time-box"><div class="time-number" id="hours">00</div><div class="time-label">ঘণ্টা</div></div>
            <div class="time-box"><div class="time-number" id="minutes">00</div><div class="time-label">মিনিট</div></div>
            <div class="time-box"><div class="time-number" id="seconds">00</div><div class="time-label">সেকেন্ড</div></div>
        </div>

        <form class="reg-form" id="registrationForm" onsubmit="generateCard(event)">
            <h3 style="text-align: center; color: #4ade80; margin-top: 0;">📝 রেজিস্ট্রেশন ফরম</h3>
            <div class="form-group">
                <label>আপনার নাম:</label>
                <input type="text" id="userName" required placeholder="নাম লিখুন">
            </div>
            <div class="form-group">
                <label>মোবাইল নম্বর:</label>
                <input type="tel" id="userPhone" required placeholder="017XXXXXXXX">
            </div>
            <div class="form-group">
                <label>আপনার ছবি যুক্ত করুন:</label>
                <input type="file" id="userPhoto" accept="image/*" required onchange="previewImage(event)">
            </div>
            <div class="form-group">
                <label>পেমেন্ট মাধ্যম:</label>
                <select id="payMethod"><option>বিকাশ</option><option>নগদ</option></select>
            </div>
            <div class="form-group">
                <label>ট্রানজেকশন আইডি (TrxID):</label>
                <input type="text" id="trxId" required placeholder="পেমেন্ট রিসিট কোড">
            </div>
            <button type="submit" class="submit-btn">সাবমিট ও কার্ড ডাউনলোড করুন</button>
        </form>
    </div>

    <div id="id-card">
        <h2 style="margin: 0; color: #15803d; font-size: 20px;">অফিশিয়াল প্রবেশপত্র</h2>
        <p style="font-size: 12px; margin: 2px 0;">পেকখালী হাজী এস এন জামান হাই স্কুল</p>
        <img id="card-img" class="user-preview-img" src="" alt="User Photo">
        <h3 id="card-name" style="margin: 5px 0 0 0;"></h3>
        <p id="card-phone" style="margin: 5px 0; color: #555;"></p>
        <p style="margin: 5px 0; font-size: 14px;">পেমেন্ট স্ট্যাটাস: <b style="color: green;">সফল (Paid)</b></p>
        
        <img id="barcode-img" src="" style="margin-top: 10px; width: 200px;" alt="Barcode">
        <br>
        <button class="print-btn" onclick="window.print()">কার্ডটি প্রিন্ট/ডাউনলোড করুন</button>
    </div>

    <script>
        // ১. অটোমেটিক লাইভ টাইমার কোড (১২ মার্চ ২০২৭ এর জন্য)
        const targetDate = new Date("March 12, 2027 11:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
        }, 1000);

        // ২. ছবি প্রাকদর্শন (Image Preview)
        let imageSrc = "";
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() { imageSrc = reader.result; }
            reader.readAsDataURL(event.target.files[0]);
        }

        // ৩. সাথে সাথে আইডি কার্ড জেনারেট করার কোড
        function generateCard(event) {
            event.preventDefault();
            
            // তথ্যগুলো নেওয়া হচ্ছে
            const name = document.getElementById("userName").value;
            const phone = document.getElementById("userPhone").value;
            const trx = document.getElementById("trxId").value;

            // কার্ডে তথ্য বসানো
            document.getElementById("card-name").innerText = name;
            document.getElementById("card-phone").innerText = "মোবাইল: " + phone;
            document.getElementById("card-img").src = imageSrc;
            
            // অনলাইন থেকে একটি ডাইনামিক বারকোড তৈরি
            document.getElementById("barcode-img").src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + trx;

            // মূল পেজ লুকিয়ে শুধু আইডি কার্ড স্ক্রিনে দেখানো
            document.getElementById("main-content").style.display = "none";
            document.getElementById("id-card").style.display = "block";
        }
    </script>
</body>
</html>
